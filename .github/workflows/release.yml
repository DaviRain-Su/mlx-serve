name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install mlx-c
        run: brew install mlx-c

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dversion=${{ steps.version.outputs.version }}

      - name: Package binary with dylibs
        run: |
          STAGING="mlx-serve-macos-arm64"
          mkdir -p "$STAGING/lib"

          # Copy binary
          cp zig-out/bin/mlx-serve "$STAGING/"

          # Bundle required dylibs
          cp /opt/homebrew/opt/mlx-c/lib/libmlxc.dylib "$STAGING/lib/"
          cp /opt/homebrew/opt/mlx/lib/libmlx.dylib "$STAGING/lib/"

          # Fix rpaths so binary finds bundled dylibs
          install_name_tool -change \
            /opt/homebrew/opt/mlx-c/lib/libmlxc.dylib \
            @executable_path/lib/libmlxc.dylib \
            "$STAGING/mlx-serve"

          # Fix libmlxc to find bundled libmlx
          install_name_tool -change \
            /opt/homebrew/opt/mlx/lib/libmlx.dylib \
            @loader_path/libmlx.dylib \
            "$STAGING/lib/libmlxc.dylib"

          # Re-sign after install_name_tool changes
          codesign --force --sign - "$STAGING/mlx-serve"
          codesign --force --sign - "$STAGING/lib/libmlxc.dylib"
          codesign --force --sign - "$STAGING/lib/libmlx.dylib"

          # Verify
          echo "=== Binary deps ==="
          otool -L "$STAGING/mlx-serve"
          echo "=== libmlxc deps ==="
          otool -L "$STAGING/lib/libmlxc.dylib"
          echo "=== Version ==="
          "$STAGING/mlx-serve" --version

          # Create tarball
          tar -czf "mlx-serve-bin-macos-arm64.tar.gz" "$STAGING"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: mlx-serve v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: mlx-serve-bin-macos-arm64.tar.gz
